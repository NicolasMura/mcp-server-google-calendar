services:
  - type: web
    name: mcp-server-google-calendar
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: false
    buildCommand: npm install --production=false && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_ENV
        value: production
      - key: MCP_TRANSPORT
        value: http
      - key: HOST
        value: 0.0.0.0
